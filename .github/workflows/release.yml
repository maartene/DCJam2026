name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            sdk: x86_64-swift-linux-musl
          - arch: aarch64
            runner: ubuntu-24.04-arm
            sdk: aarch64-swift-linux-musl
            # Target ARMv8.0 baseline so mimalloc doesn't emit LSE atomics
            # (ARMv8.1+), which crash on Raspberry Pi 3/4 (Cortex-A53/A72)
            extra_flags: -Xcc -march=armv8-a -Xcxx -march=armv8-a
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3"

      - name: Install Swift Static Linux SDK
        run: |
          swift sdk install https://download.swift.org/swift-6.3-release/static-sdk/swift-6.3-RELEASE/swift-6.3-RELEASE_static-linux-0.1.0.artifactbundle.tar.gz --checksum d2078b69bdeb5c31202c10e9d8a11d6f66f82938b51a4b75f032ccb35c4c286c
            
      - name: Build release binary (static)
        run: swift build -c release --product DCJam2026 --swift-sdk ${{ matrix.sdk }} ${{ matrix.extra_flags }}

      - name: Package binary into zip
        run: |
          mkdir -p dist
          cp .build/release/DCJam2026 dist/
          cd dist && zip DCJam2026-linux-${{ matrix.arch }}.zip DCJam2026

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DCJam2026-linux-${{ matrix.arch }}
          path: dist/DCJam2026-linux-${{ matrix.arch }}.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
