journey:
  id: player-navigate-distinct-floor
  name: Player navigates a floor that feels hand-designed
  persona:
    name: Rowan
    role: Casual roguelike player, DCJam 2026 judge/player
    context: 80x25 terminal, first playthrough, ~15 minutes in
    motivation: Experience a dungeon that feels intentionally crafted
    pain: All floors look identical — no sense of progress or place

  emotional_arc:
    start: Curious — what does floor 2 look like?
    middle: Oriented — minimap reveals a distinct shape, player builds spatial model
    end: Rewarded — landmarks found, staircase reached, next floor awaited

  trigger: Player steps onto staircase at end of floor 1

  steps:
    - id: enter-floor
      name: Enter new floor after upgrade selection
      action: Upgrade prompt dismissed; game transitions to .dungeon on new floor
      artifacts_produced: []
      artifacts_consumed: [FloorRegistry.floor(2)]
      feel: Curiosity — "what shape is this floor?"
      observable_outcomes:
        - Ember spawns at entry position of floor 2 (not floor 1's position)
        - First-person view matches the topology at entry of floor 2
        - Minimap shows a different shape from floor 1
      error_paths:
        - trigger: Player spawns at wrong position
          outcome: Out-of-bounds or inside a wall — navigation broken

    - id: read-minimap
      name: Read minimap for floor orientation
      action: Glance at top-right panel (rows 2-8+, cols 61-79)
      artifacts_produced: []
      artifacts_consumed: [minimap render, floor label in top border]
      feel: Oriented — can see shape and identify landmarks
      observable_outcomes:
        - Floor label "Floor 2/5" visible in top border (row 1, right panel)
        - Minimap shows full floor grid (may be wider/taller than floor 1)
        - Egg room symbol (*) visible if present
        - Legend still readable (rows 9-15 or adjusted for taller maps)
      error_paths:
        - trigger: Floor label missing
          outcome: Player doesn't know which floor they are on
        - trigger: Minimap clips at col 79 for a 19-wide map
          outcome: Right edge of map invisible — player misreads topology

    - id: navigate-topology
      name: Navigate the floor's distinct corridor shape
      action: W/S/A/D movement; first-person view updates per DungeonFrameKey lookup
      artifacts_produced: []
      artifacts_consumed: [FloorRegistry.floor(2).grid, DungeonFrameKey table]
      feel: Engaged — turns and lengths differ from floor 1
      observable_outcomes:
        - Wall collisions behave correctly on new grid shape
        - First-person frames render correctly at all positions on new floor
      error_paths:
        - trigger: Player walks through wall at grid boundary of wider/taller floor
          outcome: DungeonFrameKey computed from wrong grid (old FloorGenerator still called)

    - id: reach-landmarks
      name: Reach egg room, guard, staircase in intended order
      action: Move to landmark positions
      artifacts_produced: []
      artifacts_consumed: [FloorRegistry.floor(N).eggRoom, .encounter, .staircase]
      feel: Reward — floor goals completed, progression confirmed
      observable_outcomes:
        - Egg room triggers narrativeOverlay(.eggDiscovery) at correct position on floor 2
        - Guard encounter triggers combat at correct position
        - Staircase triggers floor advancement (upgrade prompt) at correct position
      error_paths:
        - trigger: Egg room at wrong position (old hardcoded Position(2,3))
          outcome: Egg never found on floors with different layouts

    - id: floor-5-boss
      name: Enter floor 5 and face the Head Warden
      action: Navigate compressed boss antechamber, reach boss encounter
      artifacts_produced: []
      artifacts_consumed: [FloorRegistry.floor(5)]
      feel: Tense — short layout, no egg room, boss at center
      observable_outcomes:
        - No egg room symbol on floor 5 minimap
        - Exit symbol (X) visible on minimap
        - Boss encounter at floor 5's intended encounter position
        - Boss encounter marker (B) on minimap at correct position
      error_paths:
        - trigger: Floor 5 uses same large layout as floor 4
          outcome: Anticlimax — no final-floor tension

  integration_points:
    - FloorRegistry must return correct FloorMap per floor number (1-5)
    - Minimap render loop uses grid.width and grid.height from returned FloorMap
    - RulesEngine uses encounter/egg/staircase/exit positions from returned FloorMap
    - Floor label in top border is driven by GameState.currentFloor and config.maxFloors
