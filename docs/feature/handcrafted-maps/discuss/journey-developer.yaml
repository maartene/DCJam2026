journey:
  id: developer-author-floor
  name: Developer authors a handcrafted floor
  persona:
    name: Maartene
    role: Solo developer, game jam entrant
    context: DCJam 2026, 80x25 terminal, Swift 6.3, jam deadline
    motivation: Make each floor feel distinct without a procedural generator
    pain: All 5 floors currently use identical L-shaped corridor from FloorGenerator

  emotional_arc:
    start: Constrained — unsure of grid limits and required landmarks
    middle: Creative — authoring a grid layout as a Swift literal
    end: Confident — tests pass, minimap renders the intended shape

  trigger: Developer notices all 5 floors are visually identical in the minimap

  steps:
    - id: understand-constraints
      name: Understand grid constraints
      action: Read docs/feature/handcrafted-maps and CLAUDE.md to learn max size (19×15), required landmark fields, floor-specific rules
      artifacts_produced: []
      artifacts_consumed: [CLAUDE.md, wave-decisions.md]
      feel: Grounded — knows the box before drawing inside it
      error_paths:
        - trigger: Developer authors a 20-wide grid
          outcome: Compiler error or test failure with clear message "width must be <= 19"

    - id: define-layout
      name: Define floor grid as Swift literal
      action: Create FloorDefinition struct instance with 2D Bool array literal and explicit landmark Positions
      artifacts_produced: [HandcraftedFloors.swift entry]
      artifacts_consumed: []
      feel: Creative ownership — the shape is intentional
      shared_data:
        - name: FloorDefinition
          type: struct (GameDomain)
          fields: [width, height, grid, entry, staircase, encounter, eggRoom, bossEncounter, exit]
      error_paths:
        - trigger: Landmark position not on a passable cell
          outcome: Test assertion failure "entry position must be passable"
        - trigger: Egg room defined on floor 1 or floor 5
          outcome: Test assertion failure "egg room only valid on floors 2-4"

    - id: register-floor
      name: Register floor in FloorRegistry
      action: Add FloorDefinition to FloorRegistry.floor(_:config:) return value for the correct floor number
      artifacts_produced: [FloorRegistry.swift entry]
      artifacts_consumed: [FloorDefinition]
      feel: Efficient — one registration point, no hunting for call sites
      integration_checkpoints:
        - RulesEngine.applyMove calls FloorRegistry (not FloorGenerator)
        - Renderer.renderDungeon calls FloorRegistry (not FloorGenerator)
        - Renderer.renderMinimap uses floor.grid.width and floor.grid.height (not hardcoded 15/7)
      error_paths:
        - trigger: FloorRegistry not called from RulesEngine
          outcome: Player walks through walls on new floor (uses old FloorGenerator grid)

    - id: compile-and-test
      name: Run swift test — existing tests pass
      action: swift test
      artifacts_produced: []
      artifacts_consumed: [HandcraftedFloors.swift, FloorRegistry.swift]
      feel: Confident — green means the shape is what was drawn
      error_paths:
        - trigger: Existing minimap tests fail (hardcoded col = 61 + x, row = 2 + (6-y))
          outcome: Tests updated to use floor.grid.height dynamically OR floor data passed to test helper

    - id: run-and-see
      name: Run swift run and navigate floor in-game
      action: Launch game, enter target floor, inspect minimap
      artifacts_produced: []
      artifacts_consumed: []
      feel: Satisfying closure — the minimap matches the drawn layout
      error_paths:
        - trigger: Floor label overlaps minimap row 2
          outcome: Label must be in top border (row 1) before this step

  integration_points:
    - FloorRegistry (new) replaces FloorGenerator at all call sites in RulesEngine and Renderer
    - FloorMap interface unchanged — FloorRegistry returns FloorMap, same as FloorGenerator did
    - minimap render loop must use floor.grid.width and floor.grid.height (dynamic, not constants)
    - top border string in drawChrome must embed floor label for the dungeon screen mode
