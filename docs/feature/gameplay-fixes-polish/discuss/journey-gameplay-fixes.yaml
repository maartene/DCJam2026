journey:
  name: gameplay-fixes-polish
  goal: Deliver three targeted corrections that repair a game-breaking bug, restore narrative
    coherence for the boss encounter, and improve minimap legibility — all within jam scope.
  persona: Ember (the player-controlled dragon); evaluated from the player's perspective

  items:

    # -----------------------------------------------------------------------
    - id: fix-1
      title: Guard Removal After Defeat
      type: bug-major
      priority: 1

      current_state:
        summary: After Ember defeats a guard, the encounter cell is never cleared.
          The guard symbol reappears on the minimap and combat re-triggers on the
          same cell as if the guard were still present.
        root_cause: >
          FloorMap.encounterPosition2D is a static, immutable property. GameState
          carries no record of which encounter cells have been cleared. minimapChar()
          and applyMove() both consult FloorMap unconditionally, so every visit to
          that cell re-triggers combat.
        user_impact: major — breaks progression; player can be trapped or killed by
          a guard they already defeated.

      desired_state:
        summary: Once a guard is defeated, the encounter cell is permanently cleared
          for the current floor. The minimap shows a passable corridor (".") and
          walking into the cell does not trigger combat.
        design_constraint: >
          FloorMap remains immutable (struct, value-type). The cleared state must
          live in GameState. A Set<Position> of defeated encounter positions,
          keyed per floor, is the minimal solution. DESIGN wave owns the
          implementation choice.

      shared_artifacts:
        - name: defeatedEncounterPositions
          source: GameState (new field, proposed)
          used_in:
            - applyMove — guard against re-triggering combat
            - minimapChar — suppress G/B symbol when position is cleared

      integration_checkpoints:
        - applyDash: dash already returns player to .dungeon; if the encounter was
            defeated (HP <= 0) before dash, the cleared-flag must still be set.
        - applySpecial: special attack can reduce guard HP to 0; defeat must register
            the cleared-flag regardless of which action dealt the killing blow.
        - Floor transition: cleared positions must reset when currentFloor increments
            (guards on prior floors are irrelevant).

    # -----------------------------------------------------------------------
    - id: fix-2
      title: Boss Art and Name Correction (Head Warden)
      type: design-change
      priority: 2

      current_state:
        summary: The boss is named "DRAGON WARDEN" in HUD and thought text, but the
          ASCII art depicts a cat face (pointed ears, whiskers, nose triangle).
          This contradicts the game's premise — antagonists are humans who stole
          Ember's egg.
        affected_locations:
          - Renderer.buildCombatFrame — enemyName string, ASCII art array
          - Renderer.combatThoughts — "Dragon Warden" reference

      desired_state:
        summary: The boss is renamed "HEAD WARDEN" and the ASCII art is replaced
          with a human figure — large, armoured, upright. The thought text
          reflects the human-antagonist narrative.
        name_in_hud: HEAD WARDEN
        minimap_symbol: B (unchanged)
        minimap_color: bold red (unchanged)
        thought_text_intent: >
          Conveys that this specific human ordered the theft; personal confrontation.
          Ember is angry, not merely wary. Must use dragon vocabulary per DEC-04.

      narrative_consistency:
        game_premise: Ember is a young dragon reclaiming a stolen egg from human captors.
        antagonists: human dungeon wardens
        boss_role: Head Warden — the jailer who ordered the theft; final obstacle.
        boss_flavor_example: >
          "The Head Warden. Armoured, enormous. The one who gave the order.
          My fire is ready — and so am I."

    # -----------------------------------------------------------------------
    - id: fix-3
      title: Minimap Legend
      type: polish
      priority: 3

      current_state:
        summary: The minimap renders 10 distinct characters with colour coding but
          no legend. First-time players cannot decode the symbols without trial
          and error.
        symbols_in_use:
          - char: "^/>/<"
            color: bold bright white
            meaning: player (with facing direction)
          - char: "G"
            color: bright red
            meaning: guard encounter
          - char: "B"
            color: bold bright red
            meaning: boss encounter
          - char: "*"
            color: bright yellow
            meaning: egg room (egg not yet collected)
          - char: "e"
            color: yellow
            meaning: egg room (egg collected)
          - char: "S"
            color: bright cyan
            meaning: staircase
          - char: "X"
            color: bold bright cyan
            meaning: exit patio (final floor only)
          - char: "E"
            color: dim cyan
            meaning: entry point
          - char: "."
            color: none
            meaning: passable corridor
          - char: "#"
            color: dark gray
            meaning: wall

      desired_state:
        summary: A compact legend appears in rows 9-16 of the right panel (cols 61-79),
          using the same symbol+colour pairs as the minimap. Seven key entries
          (player, guard, boss, egg, stairs, entry, exit) fit without overflow.
        layout_constraint:
          panel_cols: 61-79
          legend_rows: 9-16
          separator_row: 17  # must not be written to
          entry_format: "[coloured-char]  [plain-text-label]"
        entries_to_show:
          - symbol: "^"
            label: "You"
          - symbol: "G"
            label: "Guard"
          - symbol: "B"
            label: "Boss"
          - symbol: "*"
            label: "Egg"
          - symbol: "S"
            label: "Stairs"
          - symbol: "E"
            label: "Entry"
          - symbol: "X"
            label: "Exit"
        note: >
          "e" (egg collected) and "#"/"." are omitted from legend for brevity;
          their meaning is inferrable. Legend appears only in .dungeon screen mode
          (minimap is only rendered then).

  integration_validation:
    - item: fix-1 cleared-flag and fix-3 legend
      concern: If a guard is cleared, the minimap should show "." not "G".
        The legend entry for "G" remains valid because new guards on other floors
        still show "G". No legend change required for fix-1.
    - item: fix-2 name change
      concern: Renderer.combatThoughts references "Dragon Warden" by string — must
        be updated consistently with the enemyName change to avoid split vocabulary.
