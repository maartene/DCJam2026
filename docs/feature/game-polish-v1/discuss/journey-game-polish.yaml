---
# Journey Schema: Game Polish v1 — Ember's Escape
# Feature: game-polish-v1
# Date: 2026-04-03
# Author: Luna (Product Owner — DISCUSS wave)
# Source: Playtest feedback (docs/NOTES.md), spike2-narrative-overlay.swift, docs/CLAUDE.md

journey:
  id: game-polish-v1
  title: "Ember's Escape — polished player experience from launch to win"
  parent_journey: dragon-escape  # extends docs/ux/dcjam2026-core/journey-dragon-escape.yaml
  scope: brownfield polish pass
  persona:
    name: Ember
    role: young dragon / player
    context: >
      A playtest participant running Ember's Escape for the first time on a macOS/Linux terminal.
      They know roguelikes but have not read any documentation.
    motivation: >
      Recover the egg and escape the dungeon. Understand the controls immediately.
      Feel the brace and dash mechanics clearly.
    pain_points:
      - accidental_quit: "Q key triggers quit during WASD movement — playtest confirmed"
      - no_orientation: "Game starts in dungeon with no context or control introduction"
      - invisible_dash: "Dash resolves but there is no visible confirmation it worked"
      - invisible_brace: "Brace window and outcome are not communicated visually"
      - flat_status_bar: "HP and charge meters are monochrome — no urgency signal"
      - flat_minimap: "All minimap characters have the same color — threats blend into walls"
      - weak_win_screen: "Win screen is terse; doesn't match the game's narrative tone"
      - weak_egg_screen: "Egg pickup exists but spike2 showed a richer narrative version"
    emotional_start: disoriented (launch), satisfied (exit)
    emotional_end: earned relief

  polish_items:
    - id: POLISH-01
      name: Start Screen
      problem: "Player enters dungeon without context or controls knowledge"
      target_emotion: orientation → confidence
      new_screen_mode: startScreen

    - id: POLISH-02
      name: Remove Q as Quit Key
      problem: "Q is adjacent to WASD; accidental quits during play (playtest confirmed)"
      target_emotion: safety → uninterrupted flow
      change: "Remove Q/q from quit mapping in InputHandler. ESC retains quit."

    - id: POLISH-03
      name: Egg Pickup Screen — Narrative Revision
      problem: "Current eggDiscovery narrative is functional but less emotionally resonant than spike2"
      target_emotion: actual relief (named moment)
      reference: spikes/spike2-narrative-overlay.swift → showEggOverlay()
      existing: "ScreenMode.narrativeOverlay(.eggDiscovery) exists — content update only"

    - id: POLISH-04
      name: Win Screen — Narrative Revision
      problem: "Win screen is terse ('ESCAPED!'); doesn't deliver earned relief"
      target_emotion: earned relief (exhale, not fist-pump)
      reference: spikes/spike2-narrative-overlay.swift → showExitOverlay()
      existing: "ScreenMode.winState exists — content update only"

    - id: POLISH-05
      name: Color Improvements
      sub_items:
        - id: POLISH-05a
          target: HP bar
          states:
            - condition: "hp >= 40% of maxHP"
              color: green
              ansi: "\e[32m"
            - condition: "hp < 40% and >= 20% of maxHP"
              color: yellow
              ansi: "\e[33m"
            - condition: "hp < 20% of maxHP"
              color: red
              ansi: "\e[31m"

        - id: POLISH-05b
          target: "Dash cooldown and Special charge / ready indicator"
          states:
            - element: dash_cooldown_timer
              condition: "cooldown active"
              color: yellow
              note: "Timer text dims; player knows readiness is pending"
            - element: dash_charges
              condition: "charges available"
              color: bold white
            - element: spec_label_and_bar
              condition: "specialIsReady == true"
              color: bold bright cyan
              note: "Power fantasy moment — must stand out"
            - element: spec_bar
              condition: "charging (not ready)"
              color: dim cyan
            - element: brace_label
              condition: "braceOnCooldown == true"
              color: yellow

        - id: POLISH-05c
          target: Minimap
          cells:
            - symbol: "# (wall)"
              color: dark gray
              ansi: "\e[90m"
            - symbol: ". (passable)"
              color: default dim
            - symbol: "^>v< (player)"
              color: bold bright white
              ansi: "\e[97m\e[1m"
            - symbol: "G (guard)"
              color: bright red
              ansi: "\e[91m"
            - symbol: "B (boss)"
              color: bold bright red
              ansi: "\e[91m\e[1m"
            - symbol: "* (egg, not collected)"
              color: bright yellow
              ansi: "\e[93m"
            - symbol: "e (egg, collected)"
              color: dim yellow
              ansi: "\e[33m"
            - symbol: "S (stairs)"
              color: bright cyan
              ansi: "\e[96m"
            - symbol: "X (exit)"
              color: bold bright cyan
              ansi: "\e[96m\e[1m"
            - symbol: "E (entry)"
              color: dim cyan
              ansi: "\e[36m"

    - id: POLISH-06
      name: Brace Feedback Overlays
      sub_items:
        - id: POLISH-06a
          name: Parry success overlay
          trigger: "Enemy attack lands during braceWindowActive == true"
          overlay_text_suggestion: "SHIELDED!"
          sub_text: "Your scales turn the blow aside."
          tone_note: "Developer to confirm dragon-themed word. Alternatives: GUARDED! / DEFLECTED! / HELD!"
          duration_frames: 23  # ~0.75s at 30Hz
          auto_clear: true
          color: bright cyan

        - id: POLISH-06b
          name: Hit-taken overlay
          trigger: "Enemy attack lands when braceWindowActive == false (no active parry)"
          overlay_text_suggestion: "SCORCHED!"
          sub_text: "That one got through."
          tone_note: "Developer to confirm dragon-themed word. Alternatives: BURNED! / STRUCK! / OUCH!"
          duration_frames: 23
          auto_clear: true
          color: bright red
          note: "HP bar color update visible after overlay clears"

    - id: POLISH-07
      name: Dash Feedback Overlay
      trigger: "GameState.recentDash == true (already exists)"
      overlay_text_suggestion: "SWOOSH!"
      sub_text: "Wings snap. You tear through the guard."
      tone_note: "Developer to confirm dragon-themed word. Alternatives: SURGE! / BURST! / LUNGE!"
      duration_frames: 23
      auto_clear: true
      color: bright white / bold

  steps:
    - id: launch
      name: "Game Launch → Start Screen"
      trigger: "Player launches the binary"
      actor: Ember (player)
      polish_items: [POLISH-01, POLISH-02]
      before: "Dungeon renders immediately with no context"
      after: "Start screen renders with title, narrative hook, and control bindings"
      observable_outcome:
        - "Title 'Ember's Escape' visible in first render"
        - "All key bindings listed (W/S/A/D, 1/2/3, ESC)"
        - "Q is not listed as a control"
        - "'Press any key to begin' prompt visible"
      shared_artifacts:
        - ScreenMode.startScreen (new)
      emotional_beat: orientation

    - id: dungeon_navigation
      name: "Dungeon Navigation — Colored Status Bar and Minimap"
      trigger: "Player is in .dungeon screen mode"
      actor: Ember (player)
      polish_items: [POLISH-05a, POLISH-05b, POLISH-05c]
      before: "Monochrome status bar and minimap"
      after: "HP color shifts with health; charges/cooldowns color-coded; minimap landmarks stand out"
      observable_outcome:
        - "HP bar fill is green at full health"
        - "HP bar transitions to yellow below 40%"
        - "HP bar transitions to red below 20%"
        - "SPEC label and bar render in bold bright cyan when specialIsReady"
        - "Dash cooldown timer renders in yellow when active"
        - "Minimap guard characters render in bright red"
        - "Minimap egg character renders in bright yellow"
        - "Player position character is bold bright white"
      shared_artifacts:
        - GameState.hp
        - GameState.config.maxHP
        - GameState.specialCharge
        - GameState.specialIsReady
        - GameState.timerModel.activeCooldownDuration
        - GameState.braceOnCooldown
        - GameState.hasEgg
        - FloorMap (minimap landmarks)
      emotional_beat: situational_awareness

    - id: brace_success
      name: "Brace — Successful Parry"
      trigger: "Enemy attack resolves while GameState.braceWindowActive == true"
      actor: Ember (player)
      polish_items: [POLISH-06a]
      before: "Special meter increments silently; player may not notice"
      after: "Brief overlay confirms success; Special charge visually updates"
      observable_outcome:
        - "Overlay with 'SHIELDED!' (or dev-confirmed word) renders in combat view"
        - "Overlay auto-clears after ~0.75s without player input"
        - "Special charge meter reflects bonus after overlay clears"
      shared_artifacts:
        - GameState.braceWindowActive
        - GameState.specialCharge
        - new: brace outcome signal (parry result flag or NarrativeEvent case)
      emotional_beat: satisfaction_spike

    - id: brace_failure
      name: "Brace — Hit Taken (No Active Window)"
      trigger: "Enemy attack resolves while GameState.braceWindowActive == false"
      actor: Ember (player)
      polish_items: [POLISH-06b]
      before: "HP decrements; player may not realize why"
      after: "Brief overlay confirms damage taken; HP color update visible after clear"
      observable_outcome:
        - "Overlay with 'SCORCHED!' (or dev-confirmed word) renders in combat view"
        - "Overlay auto-clears after ~0.75s"
        - "HP bar color reflects new value after clear"
      shared_artifacts:
        - GameState.hp
        - new: brace outcome signal (hit-taken flag or NarrativeEvent case)
      emotional_beat: recalibration

    - id: dash_feedback
      name: "Dash — Visual Confirmation"
      trigger: "GameState.recentDash == true (set by RulesEngine on successful dash)"
      actor: Ember (player)
      polish_items: [POLISH-07]
      before: "Dungeon view changes position; no verb confirmation"
      after: "Brief overlay confirms dash with dragon-themed word"
      observable_outcome:
        - "Overlay with 'SWOOSH!' (or dev-confirmed word) renders over dungeon or combat view"
        - "Overlay auto-clears after ~0.75s"
        - "Dash charge count in status bar decremented"
      shared_artifacts:
        - GameState.recentDash (already exists)
      emotional_beat: delight

    - id: egg_pickup
      name: "Egg Pickup Screen"
      trigger: "Player enters egg room; RulesEngine sets .narrativeOverlay(.eggDiscovery)"
      actor: Ember (player)
      polish_items: [POLISH-03]
      before: "Existing narrative text (functional but less resonant)"
      after: "spike2-style content: ASCII egg art, '~ My egg. ~', 'Warm. Alive. Still here.'"
      observable_outcome:
        - "Full-screen overlay renders with egg ASCII art"
        - "Title line '~ My egg. ~' in bright yellow"
        - "'Warm. Alive. Still here.' rendered in white"
        - "Dimmed flavour line present"
        - "'[ press any key ]' prompt visible"
        - "Player must press key to continue; no auto-clear"
      shared_artifacts:
        - NarrativeEvent.eggDiscovery (existing)
        - GameState.hasEgg (existing)
      emotional_beat: actual_relief

    - id: win_screen
      name: "Win Screen"
      trigger: "GameState.screenMode == .winState"
      actor: Ember (player)
      polish_items: [POLISH-04]
      before: "Terse 'ESCAPED!' + stats block"
      after: "spike2-style narrative: 'The sky. Open. Endless. Yours.' + starfield art"
      observable_outcome:
        - "'The sky.' headline renders in bold bright cyan"
        - "Starfield ASCII art renders in white"
        - "Narrative lines from spike2 showExitOverlay present"
        - "Stat summary (floors cleared, HP remaining) still present beneath narrative"
        - "'[ Press R to play again ]' prompt visible"
      shared_artifacts:
        - ScreenMode.winState (existing)
        - GameState.currentFloor (existing)
        - GameState.hp (existing)
      emotional_beat: earned_relief

  failure_paths:
    - id: accidental_quit_prevented
      trigger: "Player presses Q during dungeon navigation"
      outcome: "No action taken — Q is unmapped. Game continues."
      note: "ESC remains the quit key. This is the fix for POLISH-02."

    - id: brace_overlay_during_death
      trigger: "Enemy hit kills player (hp <= 0) — SCORCHED overlay would fire"
      outcome: "Death screen takes priority over SCORCHED overlay. No overlay if dead."

  vocabulary_additions:
    dash_feedback:
      confirmed_options: ["SWOOSH!", "SURGE!", "BURST!", "LUNGE!"]
      note: "Developer selects final word. All options are dragon-appropriate."
    brace_success:
      confirmed_options: ["SHIELDED!", "GUARDED!", "DEFLECTED!", "HELD!"]
      note: "Developer selects final word."
    brace_failure:
      confirmed_options: ["SCORCHED!", "BURNED!", "STRUCK!", "OUCH!"]
      note: "Developer selects final word."

  implementation_notes:
    overlay_mechanism:
      option_a: >
        Add TransientOverlay enum to GameState with a frame countdown.
        RulesEngine sets it; Renderer reads it; countdown decrements each tick.
        Clean separation — domain owns the signal, Renderer owns the display.
      option_b: >
        Add new NarrativeEvent cases (braceSuccess, braceFail, dashFeedback)
        with auto-clear timer in Renderer only. Simpler but mixes timing concern
        into Renderer.
      recommendation: "Option A preferred for testability. Decision is DESIGN wave."
    q_key_removal:
      risk: "Users who learned Q to quit will be confused. Start screen must show ESC."
      mitigation: "Start screen prominently lists ESC as quit key."
    color_reset:
      critical: >
        Every colored write MUST end with ANSI reset code to prevent color bleed
        into adjacent status bar elements. Existing drawStatusBar rewrites full bar
        each frame — append reset after each colored segment.
